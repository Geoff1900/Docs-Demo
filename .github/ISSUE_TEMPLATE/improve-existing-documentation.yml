name: Improve existing documentation
description: Suggest new content or improvements to existing documentation
title: "[Improvements]: "
labels: ["documentation", "improvement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to suggest new content, point out missing guidance or offer ideas on how to improve existing documentation.

        * Before you file an issue read the [Contributing guide](./CONTRIBUTING.md).
        * Check to make sure someone hasn't already opened a similar [issue](./issues).        

  - type: textarea
    id: summary
    attributes:
      label: What would you like to improve?
      description: Describe the new content or improvement in plain English.
      placeholder: Add a page about...
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this needed?
      description: Explain the gap, problem, or benefit.
      placeholder: This would help because...
    validations:
      required: false

  - type: textarea
    id: audience
    attributes:
      label: Who is it for?
      description: Optional. Who would benefit from this?
      placeholder: Developers, testers, non-technical stakeholders...
    validations:
      required: false
