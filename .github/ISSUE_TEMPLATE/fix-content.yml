name: Fix content
description: Report a typo, broken link, or wrong information.
title: "[Fix content]: "
labels:
  - content
  - correction

body:
  - type: markdown
    attributes:
      value: |
        Thanks for raising this. Please keep it short and clear.

  - type: input
    id: page
    attributes:
      label: Page or section
      description: Which page or section needs fixing?
      placeholder: doc/index.md or a page title
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong?
      description: Tell us what needs to be fixed.
      placeholder: The link is broken / the wording is incorrect / the example is out of date.
    validations:
      required: true

  - type: textarea
    id: fix
    attributes:
      label: Suggested fix
      description: What should it say instead?
      placeholder: Optional, but helpful.

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      description: Please confirm before submitting.
      options:
        - label: I have read and agree to follow the Code of Conduct.
          required: true
