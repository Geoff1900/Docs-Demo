name: Early discussion topic
description: Start a discussion about an idea that is not ready for an issue yet.
title: "[Early discussion topic]: "
labels:
  - discussion

body:
  - type: markdown
    attributes:
      value: |
        Use this for early ideas, questions, or open topics.

  - type: input
    id: topic
    attributes:
      label: Topic
      description: What would you like to discuss?
      placeholder: Example: should we add guidance on team ownership?

  - type: textarea
    id: context
    attributes:
      label: Background
      description: A few lines of context is enough.
      placeholder: Tell us why this matters and any early thoughts.

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      description: Please confirm before submitting.
      options:
        - label: I have read and agree to follow the Code of Conduct.
          required: true
