name: Suggest a change (newest)
name: 💡 Suggest a change
description: Report something wrong, suggest improvements or ideas for new guidance.
title: "[Change]: "
labels:
  - change
  - content
  - fix

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the handbook. Please follow our [Contributing Guide](https://github.com/GIGCymru/dhcw-software-engineering-handbook/blob/main/CONTRIBUTING.md)
        and [Code of Conduct](https://github.com/GIGCymru/dhcw-software-engineering-handbook/blob/main/CODE_OF_CONDUCT.md).

  - type: dropdown
    id: change_type
    attributes:
      label: What would you like to improve?
      options:
        - Fix something (e.g. typos or broken links)
        - Suggest an improvement
        - Add new content
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What needs to change?
      description: Tell us what is wrong, unclear, or missing
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Where is this in the handbook?
      description: Optional. Feel free to leave blank if unsure
      placeholder: e.g. doc/index.md or “Using Source Control”

  - type: textarea
    id: why
    attributes:
      label: Why is this change useful?
      description: Optional. Who would benefit and how?

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Code of Conduct.
          required: true
