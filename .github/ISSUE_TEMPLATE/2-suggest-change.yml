name: Suggest a change (newest)
description: Suggest improvements, additions, or updates to the handbook.
title: "[Change]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Please follow the Contributing Guide and Code of Conduct before submitting.

  - type: dropdown
    id: type
    attributes:
      label: What type of change is this?
      options:
        - Improve existing content
        - Add new content
        - Restructure or reorganise content
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Which page or section?
    validations:
      required: true

  - type: textarea
    id: change
    attributes:
      label: What should change?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why would this help?

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Code of Conduct.
          required: true
