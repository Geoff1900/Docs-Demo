name: Suggest a change (newest)
name: 💡 Suggest a change
description: Fix something wrong, suggest improvements to existing content or ideas for new guidance.
title: "[Change]: "
labels:
  - change

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the handbook. Please follow the [Contributing Guide](https://github.com/GIGCymru/dhcw-software-engineering-handbook/blob/main/CONTRIBUTING.md)
        and our [Code of Conduct](https://github.com/GIGCymru/dhcw-software-engineering-handbook/blob/main/CODE_OF_CONDUCT.md).

  - type: dropdown
    id: change_type
    attributes:
      label: What improvements would you like?
      options:
        - Fix something (e.g. typos or broken links)
        - Improve something (make the content clearer or better)
        - Add new content (missing guidance or new topics)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What needs to change?
      description: Tell us what is wrong, unclear, or missing
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Where is this in the handbook?
      description: Optional. Feel free to leave blank if you are not sure
      placeholder: e.g. doc/index.md or “Testing guidance page”

  - type: textarea
    id: why
    attributes:
      label: Optional. Why is this change useful?
      description: Who would benefit and how?

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Code of Conduct.
          required: true
