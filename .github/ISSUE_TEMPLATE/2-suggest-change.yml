name: Suggest a change (newest)
name: 💡 Suggest a change
description: Fix something wrong, improve content, or suggest new guidance for the handbook.
title: "[Change]: "
labels:
  - change

body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the handbook.

        Please follow the [Contributing Guide](https://github.com/GIGCymru/dhcw-software-engineering-handbook/blob/main/CONTRIBUTING.md)
        and our [Code of Conduct](https://github.com/GIGCymru/dhcw-software-engineering-handbook/blob/main/CODE_OF_CONDUCT.md).

  - type: dropdown
    id: change_type
    attributes:
      label: What type of change is this?
      options:
        - Fix something (wrong, broken, or out of date)
        - Improve something (make it clearer or better)
        - Add new content (missing guidance or new topic)
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Where is this in the handbook?
      description: Page, section, or link
      placeholder: e.g. doc/index.md or “Testing guidance page”
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is the issue or gap?
      description: Tell us what is wrong, unclear, or missing
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: What should it be instead?
      description: Optional but helpful if you have a suggestion

  - type: textarea
    id: why
    attributes:
      label: Why is this change useful?
      description: Who would benefit and how?

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Code of Conduct.
          required: true
