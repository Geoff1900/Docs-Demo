name: Fix something
description: Report incorrect, outdated, or broken content.
title: "[Fix]: "
labels:
  - content
  - fix

body:
  - type: markdown
    attributes:
      value: |
        Please follow the Contributing Guide and Code of Conduct before submitting.

  - type: input
    id: location
    attributes:
      label: Where is the issue?
      placeholder: Page, section, or link
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong?
    validations:
      required: true

  - type: textarea
    id: fix
    attributes:
      label: What should it say instead?

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Code of Conduct.
          required: true
